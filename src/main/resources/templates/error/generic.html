<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error – Research Hub</title>
    <link rel="stylesheet" href="/lib/bootstrap.min.css" th:href="@{/lib/bootstrap.min.css}">
    <link rel="stylesheet" href="/css/main.css" th:href="@{/css/main.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 p-4">
                <div class="card-body">
                    <h1 class="display-4 text-danger mb-3">⚠️</h1>
                    <h2 class="fw-bold" th:text="${errorTitle ?: 'Something went wrong'}">Something went wrong</h2>
                    <p class="text-muted mt-3"
                       th:text="${errorMessage ?: 'An unexpected error occurred. Please try again.'}">
                        An unexpected error occurred.
                    </p>

                    <!--
                        FIX: Previously this page had two buttons:
                          - "Go to Dashboard" → /dashboard  ✅ safe for all roles
                          - "Browse Equipment" → /browse    ❌ BORROWER-only (@PreAuthorize)
                        A PROVIDER landing here and clicking "Browse Equipment" got a 403.
                        Replaced the second button with "Go Back" (browser history),
                        which is always safe regardless of the user's role.
                    -->
                    <div class="mt-4 d-flex justify-content-center gap-3">
                        <a th:href="@{/dashboard}" class="btn btn-primary">🏠 Go to Dashboard</a>
                        <button onclick="history.back()" class="btn btn-outline-secondary">← Go Back</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/lib/bootstrap.bundle.min.js" th:src="@{/lib/bootstrap.bundle.min.js}"></script>
</body>
</html>
