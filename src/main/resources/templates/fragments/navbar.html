<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            🔬 Research Hub
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item" sec:authorize="hasRole('BORROWER')">
                    <a class="nav-link" th:href="@{/browse}">Browse Equipment</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('BORROWER')">
                    <a class="nav-link" th:href="@{/my-requests}">My Requests</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('PROVIDER')">
                    <a class="nav-link" th:href="@{/provider/dashboard}">My Items</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('PROVIDER')">
                    <a class="nav-link" th:href="@{/provider/items/new}">+ List Item</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">Admin Panel</a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-secondary">
                        👤 <span sec:authentication="name"></span>
                    </span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/auth/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                </li>

                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/auth/login}">Login</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-primary btn-sm ms-2" th:href="@{/auth/register}">Register</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
