<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Denied – Research Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container text-center py-5">
    <h1 class="display-1 text-danger">403</h1>
    <h3 class="fw-bold">Access Denied</h3>
    <p class="text-muted" th:text="${errorMessage} ?: 'You do not have permission to view this page.'"></p>
    <a th:href="@{/dashboard}" class="btn btn-primary">Go to Dashboard</a>
</div>
</body>
</html>
