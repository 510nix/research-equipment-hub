<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Research Hub</title>
    <!-- [STABILITY FIX] Local Bootstrap CSS for tracking prevention bypass -->
    <link rel="stylesheet" href="/lib/bootstrap.min.css" th:href="@{/lib/bootstrap.min.css}">
    <link rel="stylesheet" href="/css/main.css" th:href="@{/css/main.css}">
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold">🔬 Research Hub</h2>
            <p class="text-muted">University Equipment Sharing Platform</p>
        </div>
        <div class="card p-4">
            <h5 class="card-title mb-3">Sign In</h5>

            <!-- Flash messages -->
            <div th:if="${param.error}" class="alert alert-danger">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                You have been logged out.
            </div>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

            <form th:action="@{/auth/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username"
                           class="form-control" placeholder="Enter your username" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password"
                           class="form-control" placeholder="Enter your password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
            </form>
            <hr>
            <p class="text-center mb-0 text-muted small">
                Don't have an account?
                <a th:href="@{/auth/register}">Register here</a>
            </p>
        </div>
    </div>
</div>

<!-- [STABILITY FIX] Local Bootstrap JS and app.js -->
<script src="/lib/bootstrap.bundle.min.js" th:src="@{/lib/bootstrap.bundle.min.js}"></script>
<script src="/js/app.js" th:src="@{/js/app.js}"></script>
</body>
</html>
