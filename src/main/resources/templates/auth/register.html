<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Research Hub</title>
    <!-- [STABILITY FIX] Local Bootstrap CSS for tracking prevention bypass -->
    <link rel="stylesheet" href="/lib/bootstrap.min.css" th:href="@{/lib/bootstrap.min.css}">
    <link rel="stylesheet" href="/css/main.css" th:href="@{/css/main.css}">
    <style>
        body { background: #f0f2f5; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center py-5">
    <div class="col-md-6">
        <div class="text-center mb-4">
            <h2 class="fw-bold">🔬 Research Hub</h2>
            <p class="text-muted">Create your account</p>
        </div>
        <div class="card p-4">
            <h5 class="card-title mb-3">Register</h5>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/auth/register}" method="post" th:object="${registrationDto}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" th:field="*{username}" class="form-control"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'" placeholder="e.g. john_doe">
                    <div class="invalid-feedback" th:errors="*{username}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="you@university.edu">
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" placeholder="Min. 6 characters">
                    <div class="invalid-feedback" th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">I want to join as a:</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{role}"
                                   id="roleBorrower" value="BORROWER">
                            <label class="form-check-label" for="roleBorrower">
                                📦 Borrower <small class="text-muted">(Request equipment)</small>
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" th:field="*{role}"
                                   id="roleProvider" value="PROVIDER">
                            <label class="form-check-label" for="roleProvider">
                                🏫 Provider <small class="text-muted">(List equipment)</small>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </div>
            </form>
            <hr>
            <p class="text-center mb-0 text-muted small">
                Already have an account? <a th:href="@{/auth/login}">Login here</a>
            </p>
        </div>
    </div>
</div>

<!-- [STABILITY FIX] Local Bootstrap JS and app.js -->
<script src="/lib/bootstrap.bundle.min.js" th:src="@{/lib/bootstrap.bundle.min.js}"></script>
<script src="/js/app.js" th:src="@{/js/app.js}"></script>
</body>
</html>
