<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Equipment – Research Hub</title>
    <!-- [STABILITY FIX] Local Bootstrap CSS for tracking prevention bypass -->
    <link rel="stylesheet" href="/lib/bootstrap.min.css" th:href="@{/lib/bootstrap.min.css}">
    <link rel="stylesheet" href="/css/main.css" th:href="@{/css/main.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="row mb-4">
        <div class="col-md-8">
            <h1 class="fw-bold">📦 Available Equipment</h1>
            <p class="text-muted">Browse and request equipment for your research</p>
        </div>
        <div class="col-md-4">
            <!-- Search Form -->
            <form th:action="@{/browse/search}" method="get" class="d-flex">
                <input type="text" name="q" class="form-control" 
                       placeholder="Search equipment..."
                       th:value="${searchKeyword}">
                <button type="submit" class="btn btn-primary ms-2">Search</button>
            </form>
        </div>
    </div>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Items Grid -->
    <div th:if="${#lists.isEmpty(items)}" class="alert alert-info text-center py-5">
        <h4>No equipment available</h4>
        <p class="text-muted">Check back later or try a different search.</p>
    </div>

    <div class="row g-4" th:unless="${#lists.isEmpty(items)}">
        <div class="col-md-6 col-lg-4" th:each="item : ${items}">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="${item.title}">Item Title</h5>
                    
                    <div class="mb-3">
                        <span class="badge bg-primary" th:text="${item.category?.name} ?: 'Uncategorized'">Category</span>
                        <span class="badge bg-secondary ms-2" th:text="${item.condition}">Condition</span>
                    </div>

                    <p class="card-text text-muted" th:text="${#strings.abbreviate(item.description, 100)}">
                        Item description
                    </p>

                    <div class="mb-3">
                        <small class="text-muted">
                            <strong>Owner:</strong> <span th:text="${item.owner?.username}">Unknown</span>
                        </small>
                    </div>

                    <a th:href="@{/browse/{id}(id=${item.id})}" class="btn btn-sm btn-outline-primary w-100">
                        View Details & Request
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Footer -->
    <div th:unless="${#lists.isEmpty(items)}" class="row mt-5 pt-3 border-top">
        <div class="col-md-12">
            <p class="text-muted text-center">
                <strong th:text="${#lists.size(items)}">0</strong> equipment items available
                <span th:if="${searchKeyword}"> matching "<strong th:text="${searchKeyword}"></strong>"</span>
            </p>
        </div>
    </div>
</div>

<!-- [STABILITY FIX] Local Bootstrap JS and app.js -->
<script src="/lib/bootstrap.bundle.min.js" th:src="@{/lib/bootstrap.bundle.min.js}"></script>
<script src="/js/app.js" th:src="@{/js/app.js}"></script>
</body>
</html>
