spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/research_hub}
    username: ${SPRING_DATASOURCE_USERNAME:user_name}
    password: ${SPRING_DATASOURCE_PASSWORD:password123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  thymeleaf:
    cache: false

server:
  port: ${PORT:8080}